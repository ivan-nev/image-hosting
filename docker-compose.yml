services:
  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5430:5432"
  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - images_data:/images
      - logs_data:/logs
    ports:
      - "8000:8000"   # для прямого доступа
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - images_data:/images:ro
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  db_data:
  images_data:
  logs_data: